syntax = "proto3";

package datasource.remediation;
option go_package = "github.com/ca-risken/datasource-api/proto/remediation";

import "validate/validate.proto";

service AIService {
  rpc GenerateRemediationProposal(GenerateRemediationProposalRequest)
      returns (GenerateRemediationProposalResponse);
}

message GenerateRemediationProposalRequest {
  uint32 project_id = 1 [ (validate.rules).uint32.gt = 0 ]; // Required
  uint64 finding_id = 2 [ (validate.rules).uint64.gt = 0 ]; // Required
}

message GenerateRemediationProposalResponse {
  uint32 remediation_proposal_id = 1;
}
